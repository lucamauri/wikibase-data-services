# =============================================================================
# Apache VirtualHost — WDQS Frontend (SPARQL query UI)
#
# File: docs/examples/apache/query.your-wiki.org.conf
#
# This file is an example. Copy it to your Apache sites-available directory,
# replace all occurrences of the placeholder values below, then enable it.
#
# Placeholder values to replace:
#   query.your-wiki.org  → your WDQS_FRONTEND_PUBLIC_HOST value
#   your-wiki.org        → your base domain (for the certificate path)
#   8923                 → your Anubis port (omit the Anubis block entirely
#                          if you are not using Anubis)
#   8880                 → your TRAEFIK_HOST_PORT value
#
# Required Apache modules:
#   sudo a2enmod proxy proxy_http ssl headers
#   sudo systemctl reload apache2
# =============================================================================


# -----------------------------------------------------------------------------
# Port 80 — redirect all HTTP to HTTPS
# -----------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName query.your-wiki.org
    Redirect permanent / https://query.your-wiki.org/
</VirtualHost>


# -----------------------------------------------------------------------------
# Port 443 — public HTTPS entry point
# -----------------------------------------------------------------------------
# This VirtualHost handles TLS termination and passes traffic to Anubis
# for bot filtering. If you are not using Anubis, proxy directly to the
# internal backend on :8080 instead (same ProxyPass target as below).
# -----------------------------------------------------------------------------
<VirtualHost *:443>
    ServerName query.your-wiki.org

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/your-wiki.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/your-wiki.org/privkey.pem

    # Pass the real client IP to Anubis (and onward to containers).
    # CRITICAL: the header name must be X-Real-IP with a capital P.
    # Using X-Real-Ip (lowercase p) causes Anubis to fail silently,
    # resulting in 15–30 second page loads for all users.
    RequestHeader set "X-Real-IP" expr=%{REMOTE_ADDR}

    RequestHeader set "X-Forwarded-Proto" "https"
    RequestHeader set "X-Http-Version" "%{SERVER_PROTOCOL}s"

    # Forward all traffic through Anubis on the loopback interface.
    # Anubis filters bots and passes clean traffic to the :8080 backend.
    ProxyPreserveHost On
    ProxyPass        / http://[::1]:8923/
    ProxyPassReverse / http://[::1]:8923/
</VirtualHost>


# -----------------------------------------------------------------------------
# Port 8080 — internal backend (receives traffic from Anubis)
# -----------------------------------------------------------------------------
# CRITICAL: this VirtualHost MUST use [::1]:8080, not *:8080.
# Using *:8080 would make it publicly reachable, bypassing Anubis entirely.
#
# CRITICAL: ServerName is required here. Without it, Apache cannot match
# this VirtualHost by hostname, and all :8080 traffic goes to the default
# host instead of the correct backend.
#
# ProxyPreserveHost is required so Traefik receives the correct Host header
# and can route to the right container (wdqs-frontend vs quickstatements).
# -----------------------------------------------------------------------------
<VirtualHost [::1]:8080>
    ServerName query.your-wiki.org

    # Forward to Traefik, which routes to the wdqs-frontend container.
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8880/
    ProxyPassReverse / http://127.0.0.1:8880/
</VirtualHost>