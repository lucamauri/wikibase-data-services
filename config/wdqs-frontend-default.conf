# =============================================================================
# WDQS Frontend — nginx configuration
# =============================================================================
#
# This file is volume-mounted into the wdqs-frontend container at:
#   /templates/default.conf
#
# It extends the container's built-in nginx config with one addition:
# a /sparql location that rewrites to the full Blazegraph path. This gives
# users and API consumers a clean public SPARQL endpoint URL:
#
#   https://query.example.org/sparql
#
# instead of the verbose internal path:
#
#   https://query.example.org/proxy/wdqs/bigdata/namespace/wdq/sparql
#
# The rewrite proxies through wdqs-proxy (not directly to Blazegraph), so
# all read-only enforcement and query timeout constraints remain in effect.
#
# Based on the default.conf originally shipped in the wikibase/wdqs-frontend
# Docker image, with the /sparql location added.
# =============================================================================

server {
    listen       80;
    server_name  localhost;

    # Proxy requests for the Wikibase API to the host Wikibase instance.
    # Used by the frontend UI to resolve entity labels.
    location /proxy/wikibase {
        rewrite /proxy/wikibase/(.*) /$1 break;
        proxy_pass $WIKIBASE_SCHEME://$WIKIBASE_HOST:80;
    }

    # Clean public SPARQL endpoint URL.
    # Rewrites /sparql to the full Blazegraph path and proxies through wdqs-proxy.
    # wdqs-proxy enforces read-only mode and the 60-second query timeout.
    location /sparql {
        rewrite /sparql /bigdata/namespace/wdq/sparql break;
        proxy_pass http://wdqs-proxy:80;
    }

    # Internal proxy path used by the WDQS frontend JavaScript for SPARQL queries.
    location /proxy/wdqs {
        rewrite /proxy/wdqs/(.*) /$1 break;
        proxy_pass http://wdqs-proxy:80;
    }

    # Serve the static frontend UI assets.
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
