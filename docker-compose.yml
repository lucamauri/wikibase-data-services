# =============================================================================
# wikibase-data-services — Docker Compose
# =============================================================================
#
# PURPOSE
#   Provides auxiliary data services for an existing Wikibase installation
#   running on a native LAMP stack. This stack does NOT include Wikibase,
#   MediaWiki, or MariaDB — those run on the host.
#
# SERVICES
#   - wdqs           : Blazegraph SPARQL engine
#   - wdqs-updater   : polls Wikibase API for changes, keeps Blazegraph in sync
#   - wdqs-frontend  : web UI for running SPARQL queries
#   - elasticsearch  : search backend for MediaWiki CirrusSearch extension
#   - quickstatements: batch editing tool for Wikibase
#   - traefik        : internal HTTP router (no TLS — terminated by host reverse proxy)
#
# QUICK START
#   cp template.env .env
#   nano .env             # fill in your values
#   docker compose up -d
#
# REVERSE PROXY INTEGRATION
#   Traefik listens on 127.0.0.1:${TRAEFIK_HOST_PORT} (default 8880).
#   Your host reverse proxy (Apache, Nginx, Caddy…) must proxy traffic for
#   WDQS_PUBLIC_HOST and QUICKSTATEMENTS_PUBLIC_HOST to that port.
#   See docs/apache-integration.md for Apache vhost examples.
#
#   For standalone use without a host reverse proxy, set
#   TRAEFIK_BIND_ADDRESS=0.0.0.0 in .env so Traefik is publicly reachable.
#
# IMAGES
#   All images are from the official Wikibase Suite by Wikimedia Germany.
#   See https://hub.docker.com/u/wikibase
#
# =============================================================================

name: wikibase-data-services

services:

  # ---------------------------------------------------------------------------
  # WDQS — Blazegraph SPARQL engine
  # ---------------------------------------------------------------------------
  # Stores Wikibase entity data as RDF triples and answers SPARQL queries.
  # This is the heaviest container (~2 GB RAM).
  #
  # Never exposed directly — all access goes through wdqs-frontend.
  # ---------------------------------------------------------------------------
  wdqs:
    image: wikibase/wdqs:2
    command: /runBlazegraph.sh
    restart: unless-stopped
    # Blazegraph needs a high open-file limit to avoid this abort:
    # "library initialization failed - unable to allocate file descriptor table"
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    volumes:
      - wdqs-data:/wdqs/data
    healthcheck:
      test: curl --silent --fail localhost:9999/bigdata/namespace/wdq/sparql
      interval: 10s
      start_period: 2m

  # ---------------------------------------------------------------------------
  # WDQS Updater — keeps Blazegraph in sync with Wikibase
  # ---------------------------------------------------------------------------
  # Polls the Wikibase API for recent changes and feeds them into Blazegraph.
  #
  # Reaches Wikibase via its public hostname (WIKIBASE_HOST), resolving through
  # public DNS. This works whether Wikibase is on a separate server or on the
  # same host — the container connects through Apache like any external client.
  # ---------------------------------------------------------------------------
  wdqs-updater:
    image: wikibase/wdqs:2
    command: /runUpdate.sh
    restart: unless-stopped
    depends_on:
      wdqs:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    environment:
      # Public hostname of your Wikibase instance (no scheme, no trailing slash).
      # The updater calls: ${WIKIBASE_SCHEME}://${WIKIBASE_HOST}${WIKIBASE_API_PATH}
      WIKIBASE_HOST: ${WIKIBASE_HOST}
      WIKIBASE_SCHEME: ${WIKIBASE_SCHEME:-https}
      # Path to the Wikibase API script, e.g. /dt/api.php or /w/api.php
      WIKIBASE_API_PATH: ${WIKIBASE_API_PATH}
      # Assembled from parts to ensure correct format: scheme://host/
      # Do NOT set WIKIBASE_CONCEPT_URI in .env — it is built here intentionally.
      WIKIBASE_CONCEPT_URI: ${WIKIBASE_SCHEME}://${WIKIBASE_HOST}/
      # Wikibase entity namespace IDs (120=Item, 146=Property are standard defaults).
      WIKIBASE_ENTITY_NAMESPACES: ${WIKIBASE_ENTITY_NAMESPACES:-120,122}
      UPDATER_DELAY: ${UPDATER_DELAY}
    volumes:
      # Mount our improved custom script over the upstream /runUpdate.sh
      - ./config/wdqs-updater-runUpdate.sh:/runUpdate.sh

  # ---------------------------------------------------------------------------
  # WDQS Frontend — SPARQL query web interface
  # ---------------------------------------------------------------------------
  # Browser-based SPARQL query editor. Sends queries to wdqs-proxy.
  # Publicly reachable via: host reverse proxy → Traefik → this container.
  #
  # Configured via two volume-mounted files:
  #   custom-config.json : branding, RDF prefixes, API endpoints, examples page
  #   default.conf       : nginx config adding /sparql shortcut URL
  # ---------------------------------------------------------------------------
  wdqs-frontend:
    image: wikibase/wdqs-frontend:2
    depends_on:
      wdqs:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wdqs-frontend.rule=Host(`${WDQS_FRONTEND_PUBLIC_HOST}`)"
    environment:
      # Required by entrypoint.sh validation checks
      WIKIBASE_HOST: ${WIKIBASE_HOST}
      WDQS_HOST: wdqs
      # Used by envsubst in nginx-default.conf.template
      WIKIBASE_SCHEME: ${WIKIBASE_SCHEME}
      # Used by envsubst in wdqs-frontend-config.json.template
      WIKIBASE_NAME: ${WIKIBASE_NAME}
      WIKIBASE_API_PATH: ${WIKIBASE_API_PATH}
      WIKIBASE_LOGO: ${WIKIBASE_LOGO}
      WIKIBASE_FAVICON: ${WIKIBASE_FAVICON}
      WIKIBASE_COPYRIGHT: ${WIKIBASE_COPYRIGHT}
      WIKIBASE_EXAMPLES_PAGE_TITLE: ${WIKIBASE_EXAMPLES_PAGE}
    volumes:
      # Mount custom JSON config as the template that envsubst will process.
      # The entrypoint reads this path, substitutes $VARs, then copies the
      # result to /usr/share/nginx/html/custom-config.json
      - ./config/wdqs-frontend-custom-config.json:/templates/wdqs-frontend-config.json.template:ro
      # Mount custom nginx config as the template that envsubst will process.
      # The entrypoint substitutes $WDQS_HOST, $WIKIBASE_HOST, $WIKIBASE_SCHEME,
      # and $DOLLAR, then writes the result to /etc/nginx/conf.d/default.conf
      - ./config/wdqs-frontend-default.conf:/templates/nginx-default.conf.template:ro
    healthcheck:
      test: curl --silent --fail localhost
      interval: 10s
      start_period: 2m

  # ---------------------------------------------------------------------------
  # Elasticsearch — search backend for MediaWiki CirrusSearch
  # ---------------------------------------------------------------------------
  # Provides full-text search for your MediaWiki/Wikibase installation.
  # The host MediaWiki connects to this container via the exposed port.
  #
  # In LocalSettings.php set:
  #   $wgCirrusSearchServers = [ '127.0.0.1' ];
  #   // if ELASTICSEARCH_HOST_PORT differs from 9200, also set:
  #   $wgCirrusSearchPort = <ELASTICSEARCH_HOST_PORT>;
  #
  # Bound to 127.0.0.1 only — not publicly accessible.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: wikibase/elasticsearch:1
    restart: unless-stopped
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      # Heap: keep -Xms and -Xmx equal; do not exceed 50% of available RAM.
      ES_JAVA_OPTS: -Xms512m -Xmx512m -Dlog4j2.formatMsgNoLookups=true
    ports:
      - "127.0.0.1:${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    healthcheck:
      test: curl --silent --fail localhost:9200
      interval: 10s
      start_period: 2m

  # ---------------------------------------------------------------------------
  # QuickStatements — batch editing tool for Wikibase
  # ---------------------------------------------------------------------------
  # Web UI for importing and editing large amounts of Wikibase data.
  # Authenticates via OAuth against your Wikibase instance.
  # Requires an OAuth consumer registered on Wikibase before first use.
  # Publicly reachable via: host reverse proxy → Traefik → this container.
  # ---------------------------------------------------------------------------
  quickstatements:
    image: wikibase/quickstatements:1
    restart: unless-stopped
    volumes:
      # Persistent data volume (OAuth token storage, logs)
      - quickstatements-data:/quickstatements/data
      # OAuth credentials template — substituted at container startup
      - ./config/quickstatements-oauth.ini:/templates/oauth.ini
      # Site configuration template — substituted at container startup
      - ./config/quickstatements-config.json:/templates/config.json
      # Custom favicon
      - ./config/quickstatements-favicon.ico:/var/www/html/quickstatements/public_html/favicon.ico
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quickstatements.rule=Host(`${QUICKSTATEMENTS_PUBLIC_HOST}`)"
    environment:
      # Wikibase connection
      WIKIBASE_SCHEME: ${WIKIBASE_SCHEME}
      WIKIBASE_HOST: ${WIKIBASE_HOST}
      WIKIBASE_API_PATH: ${WIKIBASE_API_PATH}
      WIKIBASE_PUBLIC_URL: ${WIKIBASE_SCHEME}://${WIKIBASE_HOST}
      # QuickStatements public URL (used for OAuth callback)
      QUICKSTATEMENTS_PUBLIC_URL: https://${QUICKSTATEMENTS_PUBLIC_HOST}
      QUICKSTATEMENTS_HOST: quickstatements
      # OAuth credentials
      OAUTH_CONSUMER_KEY: ${OAUTH_CONSUMER_KEY}
      OAUTH_CONSUMER_SECRET: ${OAUTH_CONSUMER_SECRET}
      OAUTH_SCRIPT_PATH: ${OAUTH_SCRIPT_PATH}
      # Site name (maps WIKIBASE_NAME to SITENAME used in config templates)
      SITENAME: ${WIKIBASE_NAME}
    healthcheck:
      test: curl --silent --fail localhost
      interval: 10s
      start_period: 2m

  # ---------------------------------------------------------------------------
  # Traefik — internal HTTP reverse proxy
  # ---------------------------------------------------------------------------
  # Routes HTTP from the host reverse proxy to the correct container.
  # Reads routing rules from Docker labels on each service above.
  #
  # Does NOT handle TLS — terminated externally by Apache + Anubis (or any
  # other reverse proxy). There is intentionally no port 443 here.
  #
  # TRAEFIK_BIND_ADDRESS in .env controls who can reach Traefik:
  #   127.0.0.1 → only the host machine (default; use with Apache/Nginx/Caddy)
  #   0.0.0.0   → publicly reachable (standalone mode, no host reverse proxy)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
      - "--accesslog.format=common"
      # Uncomment for Traefik dashboard (also expose 127.0.0.1:8080:8080 below):
      # - "--api.dashboard=true"
      # - "--api.insecure=true"
      # - "--log.level=DEBUG"
    ports:
      - "${TRAEFIK_BIND_ADDRESS:-127.0.0.1}:${TRAEFIK_HOST_PORT:-8880}:80"
      # - "127.0.0.1:8080:8080"   # Traefik dashboard (see above)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  # Blazegraph RDF store. Losing this requires a full reload from a Wikibase dump.
  wdqs-data:
  # Elasticsearch index. Losing this requires re-running CirrusSearch setup.
  elasticsearch-data:
  # QuickStatements OAuth tokens and job queue.
  quickstatements-data:
